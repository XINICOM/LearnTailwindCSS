<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>XINICOM's Blog Tags</title>
        <script defer src="./../scripts/navMenuBtn.js"></script>
        <script defer src="./../scripts/themeBtn.js"></script>
        <script defer src="./../scripts/imgWrapper.js"></script>
        <script defer src="./../scripts/asideHeightControl.js"></script>
        <link rel="stylesheet" href="./../output.css" />
    </head>
    <body class="antialiased color-layer-0 color-text-primary overflow-auto">
        <!-- NAVIGATION COMPONENT -->
        <nav class="w-screen h-auto flex flex-col fixed z-10" id="navcomponent">
            <!-- NAV BAR -->
            <header
                class="h-16 lg:h-20 border-b color-border color-floating color-transparent fixed top-0 left-0 right-0"
                id="navbar"
            >
                <div class="h-full px-4 flex justify-between items-center">
                    <div class="font-extrabold text-2xl lg:text-3xl font-mono">
                        XINICOM
                        <span class="highlight-color font-sans font-normal"
                            >/</span
                        >
                        <a
                            class="font-medium color-text-btn"
                            href="./../../../../../"
                            >blog</a
                        >
                    </div>
                    <div
                        class="hidden lg:flex flex-row gap-8 text-lg lg:text-xl capitalize font-sans tracking-wide"
                    >
                        <a href="#" class="color-text-btn">专栏</a>
                        <a href="#" class="color-text-btn">分类</a>
                        <a href="#" class="color-text-btn active">标签</a>
                        <a href="#" class="color-text-btn">归档</a>
                    </div>
                    <button class="color-text-btn block lg:hidden" id="navbtn">
                        <svg
                            class="w-8 h-8"
                            fill="none"
                            stroke="currentColor"
                            viewBox="0 0 24 24"
                            id="navicon"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="1.4"
                                d="M4 6h16M4 12h16M4 18h16"
                            />
                        </svg>
                    </button>
                </div>
            </header>
            <!-- NAV MENU 此 classlist 受代码控制！-->
            <div
                class="fixed overflow-auto hidden flex-col justify-start lg:hidden left-0 right-0 top-16 bottom-0 gap-0 p-0 color-floating color-transparent transition-colors duration-100 font-sans"
                id="navmenu"
            >
                <div>
                    <div
                        class="text-lg uppercase tracking-wider text-center color-floating color-solid py-2 sticky top-0 border-y color-border font-semibold"
                    >
                        导航
                    </div>
                    <div
                        class="flex flex-col gap-4 w-full text-lg capitalize tracking-wide py-2 px-8"
                    >
                        <a href="#" class="color-text-btn">专栏</a>
                        <a href="#" class="color-text-btn">分类</a>
                        <a href="#" class="color-text-btn active">标签</a>
                        <a href="#" class="color-text-btn">归档</a>
                    </div>
                </div>
            </div>
        </nav>
        <!-- TITLE -->
        <div class="aside-resize-top mt-16 lg:mt-20 color-text-content"></div>
        <div class="content-body">
            <!-- CONTENT -->
            <main class="color-text-content max-w-5xl mx-auto">
                <div class="column-info w-full px-4 lg:px-8 py-8 tracking-wide">
                    <div class="text-2xl lg:text-4xl font-semibold pb-2">
                        标签主页
                    </div>
                    <div class="text-lg lg:text-xl">
                        <p>
                            这是标签子页面的根目录，您可以访问以下子链接以查看标签和文章。
                        </p>
                    </div>
                    <div
                        class="flex flex-row flex-wrap gap-4 py-2 text-lg lg:text-xl"
                    >
                        <a class="color-text-btn" href="">
                            <div
                                class="tag-item grid grid-cols-[max-content_max-content] gap-2 items-center bg-black/5 dark:bg-code border border-border-light dark:border-border-dark rounded-md px-1"
                            >
                                Unity 开发
                            </div>
                        </a>
                    </div>
                </div>
            </main>
            <script>
                const tagIcon =
                    '<svg class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" height="1em" width="1em"><path d="M323.008 786.752c-52.928 0-96-43.072-96-96s43.072-96 96-96 96 43.072 96 96S375.936 786.752 323.008 786.752zM323.008 658.752c-17.632 0-32 14.336-32 32s14.368 32 32 32 32-14.336 32-32S340.64 658.752 323.008 658.752z" fill="currentColor"></path><path d="M416.096 927.072 284.224 927.072c-159.936 0-186.912-59.232-186.912-192l0-140.8c0-74.272 14.304-96.256 70.72-150.976l327.04-319.904c36.576-35.488 105.888-35.392 142.304-0.096l263.072 256.032c18.336 17.792 28.864 43.552 28.864 70.656 0 27.296-10.656 53.28-29.248 71.264l-290.016 294.592C544.544 880.416 497.216 927.072 416.096 927.072zM566.24 159.488c-10.496 0-20.16 3.52-26.528 9.696l-327.04 319.936c-49.952 48.48-51.36 54.528-51.36 105.152l0 140.8c0 110.272 8.352 128 122.912 128l131.872 0c52.672 0 83.744-28.48 148.992-92.8l26.656-26.144 263.232-268.256c6.784-6.592 10.336-15.808 10.336-25.888 0-9.888-3.424-18.88-9.472-24.736l-263.072-256.032C586.432 163.04 576.736 159.488 566.24 159.488z" fill="currentColor"></path> </svg>';
                const atis = document.querySelectorAll(".tag-item");
                atis.forEach((ati) =>
                    ati.insertAdjacentHTML("afterbegin", tagIcon),
                );
            </script>
        </div>
        <!-- BOTTOM -->
        <footer
            class="pt-8 pb-4 px-4 h-auto border-t color-border w-full flex flex-col justify-center gap-8 aside-resize-bottom"
        >
            <div
                class="w-full h-full flex flex-col md:flex-row justify-start md:justify-end items-center gap-8"
            >
                <!-- THEME BUTTON 此 classlist 受代码控制！ -->
                <div
                    class="flex flex-row gap-1 p-1 w-full md:w-auto border color-border rounded-full antialiased"
                    role="radiogroup"
                >
                    <button
                        class="theme-btn"
                        role="radio"
                        type="button"
                        aria-checked="false"
                        data-theme="light"
                    >
                        <svg
                            viewBox="0 0 16 16"
                            height="16"
                            width="16"
                            data-slot="geist-icon"
                            style="color: currentcolor"
                        >
                            <path
                                fill="currentColor"
                                fill-rule="evenodd"
                                d="M8.75.75V0h-1.5v2h1.5V.75M3.26 4.32l-.53-.53-.35-.35-.53-.53L2.9 1.85l.53.53.35.35.53.53zm8.42-1.06.53-.53.35-.35.53-.53 1.06 1.06-.53.53-.35.35-.53.53zM8 11.25a3.25 3.25 0 1 0 0-6.5 3.25 3.25 0 0 0 0 6.5m0 1.5a4.75 4.75 0 1 0 0-9.5 4.75 4.75 0 0 0 0 9.5m6-5.5h2v1.5h-2zm-13.25 0H0v1.5h2v-1.5H.75m1.62 5.32-.53.53 1.06 1.06.53-.53.35-.35.53-.53-1.06-1.06-.53.53zm10.2 1.06.53.53 1.06-1.06-.53-.53-.35-.35-.53-.53-1.06 1.06.53.53zM8.75 14v2h-1.5v-2z"
                                clip-rule="evenodd"
                            ></path>
                        </svg>
                        <span class="inline md:hidden"> Light </span>
                    </button>
                    <button
                        class="theme-btn active"
                        role="radio"
                        type="button"
                        aria-checked="true"
                        data-theme="system"
                    >
                        <svg
                            viewBox="0 0 16 16"
                            height="16"
                            width="16"
                            data-slot="geist-icon"
                            style="color: currentcolor"
                        >
                            <path
                                fill="currentColor"
                                fill-rule="evenodd"
                                d="M0 2a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v8.5a1 1 0 0 1-1 1H8.75v3h1.75V16h-5v-1.5h1.75v-3H1a1 1 0 0 1-1-1zm1.5.5V10h13V2.5z"
                                clip-rule="evenodd"
                            ></path>
                        </svg>
                        <span class="inline md:hidden"> System </span>
                    </button>
                    <button
                        class="theme-btn"
                        role="radio"
                        type="button"
                        aria-checked="false"
                        data-theme="dark"
                    >
                        <svg
                            viewBox="0 0 16 16"
                            height="16"
                            width="16"
                            data-slot="geist-icon"
                            style="color: currentcolor"
                        >
                            <path
                                fill="currentColor"
                                fill-rule="evenodd"
                                d="M1.5 8a6 6 0 0 1 3.62-5.51 7 7 0 0 0 7.08 9.25A5.99 5.99 0 0 1 1.5 8M6.42.58a7.5 7.5 0 1 0 7.96 10.41l-.92-1.01a5.5 5.5 0 0 1-6.3-8.25zm6.83.42v1.75H15v1.5h-1.75V6h-1.5V4.25H10v-1.5h1.75V1z"
                                clip-rule="evenodd"
                            ></path>
                        </svg>
                        <span class="inline md:hidden"> Dark </span>
                    </button>
                </div>
            </div>
            <!-- COPYRIGHT ANNOUNCEMENT -->
            <small class="color-text-secondary font-mono text-xs text-center">
                Copyright © 2026 XINICOM (YiCheng ZHOU). All Rights Reserved.
            </small>
        </footer>
    </body>
</html>
