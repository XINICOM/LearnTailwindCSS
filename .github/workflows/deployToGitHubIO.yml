name: Deploy to GitHub Pages

on:
    push:
        tags:
            - V*

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Copy SRC(Folder) to temporary deploy folder
              run: |
                  mkdir -p deploy
                  cp -r ./src/* deploy/

            - name: Deploy to GitHub Page
              uses: peaceiris/actions-gh-pages@v4
              with:
                  publish_dir: ./deploy
                  personal_token: ${{ secrets.DEPLOY_SECRET }}
                  external_repository: XINICOM/XINICOM.github.io
                  publish_bracnch: main
                  commit_message: AUTO DEPLOYMENT at %date% %time%
